<app-header></app-header>
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="login-form mx-auto">
                <h2 class="login-header">Đăng nhập</h2>
                <div class="form-group">
                    <label for="email">Email / Số điện thoại</label>
                    <input type="text" class="form-control" id="email" 
                        placeholder="Nhập email hoặc số điện thoại"
                        [ngModel]="phoneNumber()" (ngModelChange)="phoneNumber.set($event)">
                    <div class="divider-nospace"></div>
                    <div class="mt-4"></div>
                    <div class="form-group password-field">
                        <label for="password">Mật khẩu</label>
                        <input [type]="showPassword() ? 'text' : 'password'" 
                            placeholder="Nhập mật khẩu (ít nhất 3 ký tự)" 
                            class="form-control" id="password" [ngModel]="password()" (ngModelChange)="password.set($event)">
                        <i [class]="showPassword() ? 'password-toggle fas fa-eye' : 'password-toggle fas fa-eye-slash'" (click)="showPassword.set(!showPassword())"></i>
                        <div class="divider-nospace"></div>
                    </div>
                    <div class="form-group">
                        <div class="form-check checkbox-text text-end">
                            <a href="#" class="register-link">Quên mật khẩu?</a>
                        </div>
                    </div>
                    <button type="button" class="login-button" (click)="login()">Đăng nhập</button>
                    <div class="divider"></div>
                    <p class="text-center">Bạn chưa đăng ký? <span>
                            <a (click)="navigateToRegister()" class="register-link" style="cursor: pointer;">Tạo tài khoản</a></span></p>
                </div>
            </div>
        </div>
    </div>
</div>
<app-footer></app-footer>
